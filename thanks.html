<style>
:root{
  --orange:#f98306;
  --orange-dark:#d96e00;
  --orange-light:#ffb15c;
  --orange-soft:#fff4e8;
  --ink:#1c1712;
  --gray:#6b6259;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',-apple-system,sans-serif;color:var(--ink);background:linear-gradient(180deg,#fff8f0 0%,#fff 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;line-height:1.6;overflow-x:hidden;position:relative}
.blob{position:fixed;border-radius:50%;filter:blur(70px);opacity:.5;pointer-events:none;z-index:0}
.blob.b1{width:480px;height:480px;background:radial-gradient(circle,rgba(249,131,6,.30),transparent 65%);top:-160px;inset-inline-start:-140px}
.blob.b2{width:400px;height:400px;background:radial-gradient(circle,rgba(255,177,92,.35),transparent 65%);bottom:-140px;inset-inline-end:-100px}
.card{position:relative;z-index:1;background:#fff;border-radius:26px;box-shadow:0 24px 60px rgba(28,23,18,.14);max-width:560px;width:100%;padding:52px 44px;text-align:center;animation:in .8s cubic-bezier(.2,.65,.3,1)}
@keyframes in{from{opacity:0;transform:translateY(36px) scale(.97)}}
.logo{width:74px;height:74px;border-radius:50%;object-fit:cover;margin:0 auto 20px;box-shadow:0 10px 26px rgba(28,23,18,.12)}
.check{width:84px;height:84px;border-radius:50%;background:linear-gradient(135deg,var(--orange),#ff9a2a);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:0 14px 34px rgba(249,131,6,.4);animation:pop .6s .3s cubic-bezier(.2,.65,.3,1) backwards}
@keyframes pop{from{transform:scale(0)}}
.check svg{width:40px;height:40px;stroke:#fff;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.check svg path{stroke-dasharray:40;stroke-dashoffset:40;animation:draw .5s .7s ease forwards}
@keyframes draw{to{stroke-dashoffset:0}}
h1{font-size:clamp(1.6rem,5vw,2.2rem);font-weight:900;letter-spacing:-.02em;margin-bottom:10px}
h1 em{font-style:normal;color:var(--orange)}
p{color:var(--gray);font-size:1.08rem;margin-bottom:8px}
.steps{background:var(--orange-soft);border-radius:16px;padding:20px 24px;margin:26px 0;text-align:right}
.steps b{display:block;font-weight:800;color:var(--orange-dark);margin-bottom:8px;font-size:.95rem}
.steps ol{list-style:none;display:grid;gap:8px}
.steps li{display:flex;gap:10px;align-items:flex-start;color:#5b5348;font-size:.96rem}
.steps .n{flex:none;width:22px;height:22px;border-radius:50%;background:var(--orange);color:#fff;font-weight:800;font-size:.78rem;display:flex;align-items:center;justify-content:center;margin-top:3px}
.ig{display:inline-flex;align-items:center;gap:8px;color:var(--orange-dark);font-weight:700;text-decoration:none;font-size:.98rem}
.ig:hover{text-decoration:underline}
.back{display:inline-block;margin-top:18px;color:#a39a8f;font-size:.85rem;text-decoration:none}
.back:hover{color:var(--gray)}
</style>
</head>
<body>
<div class="blob b1"></div>
